# Compile gate — honest label: proves it BUILDS (typecheck/imports), not that it works.
# Tests run via --if-present; repos without tests pass. Add real tests before trusting green.
name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  compile-gate:
    name: compile-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci || npm install
      - run: npm run build --if-present
      - run: npm test --if-present
      - name: boot-smoke
        # Proves the app actually STARTS and serves /api/health — catches ESM/runtime
        # crashes that `node --check` (syntax-only) misses. Apps only; landers have no server.js.
        if: ${{ hashFiles('server.js') != '' }}
        env: { PORT: '3000' }
        run: |
          npm start & SV=$!
          ok=
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null 2>&1 && { ok=1; break; }
            sleep 1
          done
          kill $SV 2>/dev/null || true
          [ -n "$ok" ] || { echo "boot-smoke FAILED: app never served /api/health (crash on start?)"; exit 1; }
          echo "boot-smoke OK"
